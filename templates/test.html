{% extends "base.html" %}

{% block title %}Overview - Health Tracker{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Test Page</h1>
    <p>Maintenance kcal distribution example</p>
</div>

<div class="form-section" style="margin-top: 16px;">
    <h2>Maintenance kcal Histogram</h2>
    <div id="maintenanceHistogram" style="height: 340px;"></div>
</div>


{% endblock %}

{% block scripts %}
<script>
    function mean(values) {
        if (!values.length) return null;
        return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function stddev(values, avg) {
        if (values.length < 2 || avg === null) return null;
        const variance =
            values.reduce((sum, value) => sum + ((value - avg) ** 2), 0) / values.length;
        return Math.sqrt(variance);
    }

    function normalPdf(x, avg, sd) {
        if (sd === null || sd === 0) return 0;
        const z = (x - avg) / sd;
        return Math.exp(-0.5 * z * z) / (sd * Math.sqrt(2 * Math.PI));
    }

    async function loadMaintenanceHistogram() {
        try {
            const res = await fetch('/api/entries');
            const payload = await res.json();
            const entries = Array.isArray(payload) ? payload : payload?.entries;
            const el = document.getElementById('maintenanceHistogram');

            if (!el || !Array.isArray(entries)) return;

            const values = entries
                .map((entry) => entry.maintenance_kcal)
                .filter((value) => typeof value === 'number' && Number.isFinite(value));

            if (!values.length) return;

            const avg = mean(values);
            const sd = stddev(values, avg);
            const min = Math.min(...values);
            const max = Math.max(...values);
            const step = Math.max(1, (max - min) / 80);

            const curveX = [];
            const curveY = [];
            for (let x = min; x <= max; x += step) {
                curveX.push(x);
                curveY.push(normalPdf(x, avg, sd));
            }

            const bandX = curveX.filter((x) => x >= (avg - sd) && x <= (avg + sd));
            const bandY = bandX.map((x) => normalPdf(x, avg, sd));
            const rugTop = Math.max(...curveY) * 0.08;

            Plotly.newPlot(
                'maintenanceHistogram',
                [
                    {
                        x: values,
                        y: values.map(() => rugTop),
                        type: 'scatter',
                        mode: 'markers',
                        marker: {
                            color: '#38bdf8',
                            symbol: 'line-ns-open',
                            size: 16,
                            line: { width: 1.5, color: '#38bdf8' },
                        },
                        hovertemplate: 'Maintenance: %{x:.0f} kcal<extra></extra>',
                        name: 'Maintenance values',
                    },
                    {
                        x: bandX,
                        y: bandY,
                        type: 'scatter',
                        mode: 'lines',
                        line: { width: 0 },
                        fill: 'tozeroy',
                        fillcolor: 'rgba(34, 197, 94, 0.12)',
                        hoverinfo: 'skip',
                        showlegend: false,
                    },
                    {
                        x: curveX,
                        y: curveY,
                        type: 'scatter',
                        mode: 'lines',
                        line: { color: '#f97316', width: 2 },
                        name: 'Normal fit',
                    },
                ],
                {
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    plot_bgcolor: 'rgba(0,0,0,0)',
                    margin: { t: 20, r: 20, b: 60, l: 60 },
                    xaxis: { title: 'Maintenance (kcal)' },
                    yaxis: {
                        showticklabels: false,
                        ticks: '',
                        showgrid: false,
                        zeroline: false,
                        range: [0, Math.max(...curveY) * 1.1],
                    },
                    shapes: [
                        {
                            type: 'line',
                            xref: 'x',
                            yref: 'paper',
                            x0: avg,
                            x1: avg,
                            y0: 0,
                            y1: 1,
                            line: { color: '#22c55e', width: 2, dash: 'dash' },
                        },
                    ],
                    showlegend: true,
                },
                {
                    responsive: true,
                    displaylogo: false,
                    scrollZoom: false,
                    modeBarButtonsToRemove: ['lasso2d', 'select2d'],
                }
            );
        } catch (error) {
            console.error('Error loading maintenance histogram:', error);
        }
    }

    // Load data on page load
    loadMaintenanceHistogram();
</script>
{% endblock %}
